  <rect x="435" y="50" width="100" height="36" rx="4" fill="url(#gradBackend)" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="600" y="50" width="190" height="36" rx="4" fill="url(#gradUI)" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>

  <rect x="860" y="50" width="200" height="40" rx="4" fill="url(#gradTransport)" stroke="#009688" stroke-width="2" filter="url(#shadow)"/>

  <text x="907" y="128" font-size="13" font-weight="bold" text-anchor="middle" fill="#004d40">tcp.rs</text>

  <rect x="965" y="105" width="95" height="36" rx="4" fill="url(#gradTransport)" stroke="#009688" stroke-width="1" filter="url(#shadow)"/>
  <text x="1012" y="128" font-size="13" font-weight="bold" text-anchor="middle" fill="#004d40">zmq.rs</text>

  <!-- ====== COMMANDS & HELP ====== -->
  <rect x="860" y="230" width="100" height="36" rx="4" fill="url(#gradLib)" stroke="#e91e63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="910" y="253" font-size="13" font-weight="bold" text-anchor="middle" fill="#880e4f">commands.rs</text>

  <rect x="975" y="230" width="90" height="36" rx="4" fill="url(#gradLib)" stroke="#e91e63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1020" y="253" font-size="13" font-weight="bold" text-anchor="middle" fill="#880e4f">message.rs</text>

  <rect x="860" y="280" width="100" height="36" rx="4" fill="url(#gradLib)" stroke="#e91e63" stroke-width="1" filter="url(#shadow)"/>

  <rect x="975" y="280" width="90" height="36" rx="4" fill="url(#gradLib)" stroke="#e91e63" stroke-width="1" filter="url(#shadow)"/>
  <text x="1020" y="303" font-size="13" font-weight="bold" text-anchor="middle" fill="#880e4f">event.rs</text>

  <!-- ====== INTERFACES / TRAITS ====== -->
  <rect x="580" y="310" width="510" height="110" rx="6" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>
  <text x="595" y="328" font-size="10" fill="#888" font-weight="bold">Key Interfaces</text>

  <rect x="600" y="338" width="230" height="34" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="610" y="352" font-size="10" font-family="monospace" fill="#555">trait Transport {</text>
  <text x="618" y="366" font-size="10" font-family="monospace" fill="#555">  connect / disconnect / send / recv</text>

  <rect x="845" y="338" width="230" height="34" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="855" y="352" font-size="10" font-family="monospace" fill="#555">enum Command { Run(Action) / ShowSystem / Permission }</text>
  <text x="855" y="366" font-size="10" font-family="monospace" fill="#555">enum Action { Help, Clear, Exit, Model, Plan, Demo, Connect, ... }</text>

  <rect x="600" y="380" width="230" height="34" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="610" y="394" font-size="10" font-family="monospace" fill="#555">struct ViewState { messages, mode, model,</text>
  <text x="618" y="408" font-size="10" font-family="monospace" fill="#555">  streaming, conn, state, modal, ... }</text>

  <rect x="845" y="380" width="230" height="34" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="855" y="394" font-size="10" font-family="monospace" fill="#555">struct CommandSpec { name, desc, subs, build }</text>
  <text x="855" y="408" font-size="10" font-family="monospace" fill="#555">fn completion_ctx(input) → CompletionCtx</text>

  <!-- ====== ARROWS (call relationships) ====== -->

  <!-- main → Frontend -->
  <line x1="130" y1="86" x2="130" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arrowCall)"/>

  <!-- Frontend → Backend (Command channel) -->
  <line x1="250" y1="235" x2="318" y2="180" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowData)" stroke-dasharray="6,2"/>
  <text x="270" y="200" font-size="9" fill="#1a73e8">mpsc::Sender&lt;Command&gt;</text>

  <!-- Frontend ← Backend (ViewState watch) -->
  <line x1="318" y1="235" x2="250" y2="250" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowData)" stroke-dasharray="6,2"/>
  <text x="270" y="265" font-size="9" fill="#1a73e8">watch::Receiver&lt;ViewState&gt;</text>

  <line x1="250" y1="250" x2="598" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arrowCall)"/>

  <line x1="250" y1="260" x2="858" y2="248" stroke="#555" stroke-width="1" marker-end="url(#arrowCall)"/>

  <!-- UI → Frontend (reads) -->
  <line x1="695" y1="50" x2="140" y2="210" stroke="#555" stroke-width="1" marker-end="url(#arrowCall)" stroke-dasharray="4,2"/>
  <text x="450" y="135" font-size="8" fill="#888">reads scroll / input / view</text>

  <!-- Flow legend box -->
  <rect x="20" y="440" width="520" height="135" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="462" font-size="13" font-weight="bold" fill="#333">Request Flow (example: user types "/model claude" Enter)</text>

  <text x="35" y="484" font-size="11" fill="#555" font-family="monospace">1. KeyEvent::Enter</text>
  <text x="45" y="500" font-size="11" fill="#555" font-family="monospace">   → Frontend.on_key() → submit() → parse_action() → Action::Model(Claude)</text>
  <text x="35" y="518" font-size="11" fill="#555" font-family="monospace">2. Frontend.send(Command::Run(action))</text>
  <text x="45" y="534" font-size="11" fill="#555" font-family="monospace">   → mpsc channel → Backend.handle_command()</text>
  <text x="35" y="552" font-size="11" fill="#555" font-family="monospace">3. Backend → dispatch.rs → chat.rs (set_model, push_system)</text>
  <text x="45" y="568" font-size="11" fill="#555" font-family="monospace">   → snapshot() → watch channel → ViewState → Frontend.view_rx.changed() → re-render</text>

  <!-- Data channels box -->
  <rect x="560" y="440" width="520" height="135" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="575" y="462" font-size="13" font-weight="bold" fill="#333">Data Channels (tokio channels between threads)</text>

  <text x="575" y="486" font-size="11" fill="#555" font-family="monospace">Thread 1 (main):   Frontend::run() event loop</text>
  <text x="585" y="504" font-size="11" fill="#555" font-family="monospace">  • Terminal draw at 60fps (ratatui + crossterm)</text>
  <text x="585" y="520" font-size="11" fill="#555" font-family="monospace">  • Key events → on_key() → parse / submit / scroll / history</text>

  <text x="575" y="542" font-size="11" fill="#555" font-family="monospace">Thread 2 (worker): Backend event loop (tokio::spawn)</text>
  <text x="585" y="560" font-size="11" fill="#555" font-family="monospace">  • mpsc::Receiver&lt;Command&gt; → dispatch to subsystems</text>
  <text x="585" y="575" font-size="11" fill="#555" font-family="monospace">  • watch::Sender&lt;ViewState&gt; → push snapshots to Frontend</text>

  <!-- Layer annotation -->
  <rect x="20" y="595" width="1060" height="200" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="618" font-size="13" font-weight="bold" fill="#333">Module Dependency Graph (imports)</text>

  <!-- ASCII-like dependency tree -->
  <text x="35" y="642" font-size="11" fill="#555" font-family="monospace">main.rs ───► frontend ──┬──► commands ──► transport::Protocol</text>
  <text x="35" y="660" font-size="11" fill="#555" font-family="monospace">             │          ├──► backend ──┬──► chat ──► message::Message</text>
  <text x="35" y="678" font-size="11" fill="#555" font-family="monospace">             │          │              ├──► conn ──► transport::{tcp, zmq} ──► json_framer</text>
  <text x="35" y="696" font-size="11" fill="#555" font-family="monospace">             │          │              ├──► llm ──► chat, modal</text>
  <text x="35" y="714" font-size="11" fill="#555" font-family="monospace">             │          │              └──► modal ──► chat, message</text>
  <text x="35" y="732" font-size="11" fill="#555" font-family="monospace">             │          └──► ui ──┬──► conversation ──► markdown, tool_card, message</text>
  <text x="35" y="750" font-size="11" fill="#555" font-family="monospace">             │                  ├──► input ──► frontend (reads input, menu)</text>
  <text x="35" y="768" font-size="11" fill="#555" font-family="monospace">             │                  ├──► modal ──► message</text>
  <text x="35" y="786" font-size="11" fill="#555" font-family="monospace">             │                  ├──► state_panel ──► json_framer</text>
  <text x="35" y="804" font-size="11" fill="#555" font-family="monospace">             │                  └──► statusline</text>
