<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>sim_cli — Message Format &amp; Channel Flow</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f8f9fa; color: #222; }
  h1 { text-align: center; margin: 0 0 4px; font-size: 20px; }
  .sub { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
  svg { display: block; margin: 0 auto; max-width: 100%; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #ddd; }
    .sub { color: #999; }
  }
</style>
</head>
<body>
<h1>sim_cli — Channel &amp; Message Format Diagram</h1>
<p class="sub">Every arrow = a typed channel. Box = enum/struct payload.</p>

<svg viewBox="0 0 1280 1020" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.1"/>
    </filter>
    <marker id="aCmd"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#d32f2f"/></marker>
    <marker id="aView" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#1976d2"/></marker>
    <marker id="aTr"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#00796b"/></marker>
    <marker id="aLlm"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#e65100"/></marker>
    <marker id="aGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#888"/></marker>
  </defs>

  <!-- ================================================================ -->
  <!-- TOP BANNER: three major channels -->
  <!-- ================================================================ -->

  <!-- ── Channel 1: Command (Frontend → Backend) ── -->
  <rect x="20" y="20" width="1240" height="28" rx="4" fill="#ffebee" stroke="#d32f2f" stroke-width="1"/>
  <text x="40" y="39" font-size="13" font-family="monospace" fill="#c62828" font-weight="bold">Channel 1 &nbsp;┃  mpsc::Sender&lt;Command&gt;  &nbsp;┃  Frontend ──────────────────────────► Backend (handle_command)</text>

  <!-- ── Channel 2: ViewState (Backend → Frontend) ── -->
  <rect x="20" y="56" width="1240" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="40" y="75" font-size="13" font-family="monospace" fill="#1565c0" font-weight="bold">Channel 2 &nbsp;┃  watch::Sender&lt;ViewState&gt;  &nbsp;┃  Backend ──────────────────────────► Frontend (view_rx.changed → re‑render)</text>

  <!-- ── Channel 3: TransportEvent ── -->
  <rect x="20" y="92" width="1240" height="28" rx="4" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
  <text x="40" y="111" font-size="13" font-family="monospace" fill="#004d40" font-weight="bold">Channel 3 &nbsp;┃  mpsc::Sender&lt;TransportEvent&gt;  &nbsp;┃  Transport (tcp/zmq spawn) ──────► Backend (dispatch::apply_transport_event)</text>

  <!-- ── Channel 4: LlmEvent ── -->
  <rect x="20" y="128" width="1240" height="28" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="40" y="147" font-size="13" font-family="monospace" fill="#bf360c" font-weight="bold">Channel 4 &nbsp;┃  mpsc::Receiver&lt;LlmEvent&gt;  &nbsp;┃  LlmSubsystem ──────────────────────► Backend (handle_event)</text>

  <!-- ── Channel 5: Transport out_tx ── -->
  <rect x="20" y="164" width="1240" height="28" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="40" y="183" font-size="13" font-family="monospace" fill="#6a1b9a" font-weight="bold">Channel 5 &nbsp;┃  mpsc::Sender&lt;String&gt;  (TransportHandle.out_tx)  &nbsp;┃  Backend ──► Transport (send raw JSON)</text>

  <!-- ================================================================ -->
  <!-- MESSAGE PAYLOADS — three columns -->
  <!-- ================================================================ -->

  <!-- Column A: Command payloads -->
  <g transform="translate(20, 210)">
    <rect x="0" y="0" width="400" height="305" rx="6" fill="#fff" stroke="#d32f2f" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="400" height="28" rx="6" fill="#ffcdd2"/>
    <text x="200" y="19" font-size="13" font-weight="bold" text-anchor="middle" fill="#b71c1c">enum Command (Frontend → Backend)</text>

    <!-- Command::Run(Action) -->
    <rect x="12" y="40" width="376" height="62" rx="4" fill="#fff5f5" stroke="#ffcdd2" stroke-width="0.5"/>
    <text x="22" y="58" font-size="12" font-family="monospace" font-weight="bold" fill="#c62828">Command::Run(Action)</text>
    <text x="32" y="74" font-size="10" font-family="monospace" fill="#555">Action::Help</text>
    <text x="32" y="88" font-size="10" font-family="monospace" fill="#555">Action::Clear &nbsp;|  Exit &nbsp;|  Disconnect &nbsp;|  Send</text>

    <!-- Action variants with subs -->
    <rect x="12" y="110" width="376" height="62" rx="4" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
    <text x="22" y="128" font-size="11" font-family="monospace" fill="#888">(Action variants with typed args via parse_action)</text>
    <text x="22" y="146" font-size="10" font-family="monospace" fill="#555">Action::Model(ModelChoice::Claude|Opus|Haiku)</text>
    <text x="22" y="162" font-size="10" font-family="monospace" fill="#555">Action::Plan(PlanToggle::On|Off) &nbsp; Action::Connect(Protocol::Tcp|Zmq)</text>

    <!-- Command::Permission -->
    <rect x="12" y="180" width="376" height="40" rx="4" fill="#fff5f5" stroke="#ffcdd2" stroke-width="0.5"/>
    <text x="22" y="198" font-size="12" font-family="monospace" font-weight="bold" fill="#c62828">Command::Permission(ModalChoice)</text>
    <text x="32" y="213" font-size="10" font-family="monospace" fill="#555">ModalChoice::Yes &nbsp;|  No &nbsp;|  Always</text>

    <!-- Command::ShowSystem -->
    <rect x="12" y="228" width="376" height="40" rx="4" fill="#fff5f5" stroke="#ffcdd2" stroke-width="0.5"/>
    <text x="22" y="246" font-size="12" font-family="monospace" font-weight="bold" fill="#c62828">Command::ShowSystem(String)</text>
    <text x="32" y="261" font-size="10" font-family="monospace" fill="#555">parse errors / system notices</text>
  </g>

  <!-- Column B: ViewState payload -->
  <g transform="translate(440, 210)">
    <rect x="0" y="0" width="400" height="305" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="400" height="28" rx="6" fill="#bbdefb"/>
    <text x="200" y="19" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">struct ViewState (Backend → Frontend)</text>

    <text x="16" y="53" font-size="11" font-family="monospace" fill="#333">Arc&lt;Vec&lt;Message&gt;&gt; &nbsp;messages</text>
    <text x="26" y="70" font-size="10" font-family="monospace" fill="#888">  → conversion &amp; state_panel render</text>

    <line x1="16" y1="80" x2="384" y2="80" stroke="#eee" stroke-width="0.5"/>

    <text x="16" y="97" font-size="11" font-family="monospace" fill="#333">String &nbsp;model</text>
    <text x="26" y="114" font-size="10" font-family="monospace" fill="#888">  "mock-claude" | "mock-opus" | "mock-haiku"</text>

    <text x="16" y="131" font-size="11" font-family="monospace" fill="#333">Mode &nbsp;mode</text>
    <text x="26" y="148" font-size="10" font-family="monospace" fill="#888">  Mode::Normal  |  Mode::Plan</text>

    <text x="16" y="165" font-size="11" font-family="monospace" fill="#333">bool &nbsp;streaming</text>
    <text x="16" y="182" font-size="11" font-family="monospace" fill="#333">Option&lt;ModalRequest&gt; &nbsp;modal</text>
    <text x="16" y="199" font-size="11" font-family="monospace" fill="#333">bool &nbsp;should_quit</text>

    <text x="16" y="216" font-size="11" font-family="monospace" fill="#333">ConnState &nbsp;conn</text>
    <text x="26" y="233" font-size="10" font-family="monospace" fill="#888">  Disconnected | Connecting{protocol,addr} | Connected{...} | Error(String)</text>

    <text x="16" y="254" font-size="11" font-family="monospace" fill="#333">Option&lt;serde_json::Value&gt; &nbsp;latest_recv</text>
    <text x="16" y="271" font-size="11" font-family="monospace" fill="#333">Option&lt;DateTime&lt;Local&gt;&gt; &nbsp;latest_recv_at</text>

    <text x="16" y="293" font-size="10" font-family="monospace" fill="#999">published via snapshot() after every event</text>
  </g>

  <!-- Column C: Event payloads (Transport + LLM) -->
  <g transform="translate(860, 210)">
    <rect x="0" y="0" width="400" height="305" rx="6" fill="#fff" stroke="#888" stroke-width="1.5" filter="url(#sh)"/>

    <!-- TransportEvent box -->
    <rect x="0" y="0" width="400" height="155" rx="6" fill="#fafafa" stroke="#00796b" stroke-width="1"/>
    <rect x="0" y="0" width="400" height="26" rx="6" fill="#b2dfdb"/>
    <text x="200" y="18" font-size="12" font-weight="bold" text-anchor="middle" fill="#004d40">enum TransportEvent</text>

    <text x="14" y="46" font-size="10" font-family="monospace" fill="#333">Connecting { protocol: Protocol, addr: String }</text>
    <text x="14" y="64" font-size="10" font-family="monospace" fill="#333">Connected  { protocol: Protocol, addr: String }</text>
    <text x="14" y="82" font-size="10" font-family="monospace" fill="#333">Recv       { encoding: String, text: String }</text>
    <text x="24" y="98" font-size="9" font-family="monospace" fill="#888">  encoding = "json" | "pb"  (ZMQ topic)</text>
    <text x="24" y="113" font-size="9" font-family="monospace" fill="#888">  text     = JSON string   (proto→JSON at boundary)</text>
    <text x="14" y="131" font-size="10" font-family="monospace" fill="#333">Disconnected</text>
    <text x="14" y="148" font-size="10" font-family="monospace" fill="#333">Error      (String)</text>

    <!-- LlmEvent box -->
    <rect x="0" y="165" width="400" height="140" rx="6" fill="#fff8f0" stroke="#e65100" stroke-width="1"/>
    <rect x="0" y="165" width="400" height="26" rx="6" fill="#ffe0b2"/>
    <text x="200" y="183" font-size="12" font-weight="bold" text-anchor="middle" fill="#bf360c">enum LlmEvent</text>

    <text x="14" y="208" font-size="11" font-family="monospace" fill="#333">Token(String)</text>
    <text x="24" y="224" font-size="9" font-family="monospace" fill="#888">  streaming text chunk → append to Message::Assistant.text</text>

    <text x="14" y="246" font-size="11" font-family="monospace" fill="#333">StartTool { tool_name: String, args_preview: String }</text>
    <text x="24" y="262" font-size="9" font-family="monospace" fill="#888">  → push Message::Tool → open modal if not auto-allowed</text>

    <text x="14" y="282" font-size="11" font-family="monospace" fill="#333">ToolDone { output: String }</text>
    <text x="24" y="297" font-size="9" font-family="monospace" fill="#888">  → set ToolStatus::Done → push new blank Assistant</text>

    <text x="14" y="312" font-size="11" font-family="monospace" fill="#333">Done</text>
    <text x="24" y="327" font-size="9" font-family="monospace" fill="#888">  → clear streaming flag</text>
  </g>

  <!-- ================================================================ -->
  <!-- ROW 2: Message enum & Tool types (stored inside chat) -->
  <!-- ================================================================ -->

  <g transform="translate(20, 530)">
    <rect x="0" y="0" width="1240" height="175" rx="6" fill="#fff" stroke="#7b1fa2" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="1240" height="28" rx="6" fill="#e1bee7"/>
    <text x="620" y="19" font-size="13" font-weight="bold" text-anchor="middle" fill="#4a148c">Chat State — stored inside Backend.chat.messages: Vec&lt;Message&gt;</text>

    <!-- Message::Assistant -->
    <rect x="16" y="42" width="380" height="60" rx="4" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
    <text x="28" y="62" font-size="12" font-family="monospace" font-weight="bold" fill="#7b1fa2">Message::Assistant { text, streaming }</text>
    <text x="38" y="78" font-size="10" font-family="monospace" fill="#555">text: String         (markdown body, mutated by LlmEvent::Token)</text>
    <text x="38" y="94" font-size="10" font-family="monospace" fill="#555">streaming: bool      (renders cursor blink "▌" when true)</text>

    <!-- Message::Tool -->
    <rect x="412" y="42" width="430" height="60" rx="4" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
    <text x="424" y="62" font-size="12" font-family="monospace" font-weight="bold" fill="#7b1fa2">Message::Tool(ToolCall { name, args_preview, status, output })</text>
    <text x="434" y="78" font-size="10" font-family="monospace" fill="#555">status: ToolStatus::AwaitingPermission | Running | Done | Denied</text>
    <text x="434" y="94" font-size="10" font-family="monospace" fill="#555">→ rendered as tool_card (name + status badge + output block)</text>

    <!-- Message::System -->
    <rect x="858" y="42" width="366" height="60" rx="4" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
    <text x="870" y="62" font-size="12" font-family="monospace" font-weight="bold" fill="#7b1fa2">Message::System(String)</text>
    <text x="880" y="78" font-size="10" font-family="monospace" fill="#555">connection status / parse errors / "cleared" notices</text>
    <text x="880" y="94" font-size="10" font-family="monospace" fill="#555">→ rendered in dark gray, not markdown-processed</text>

    <!-- Modal flow mini-diagram -->
    <rect x="16" y="118" width="1208" height="48" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="30" y="136" font-size="10" font-family="monospace" fill="#888">Modal flow:</text>
    <text x="130" y="136" font-size="10" font-family="monospace" fill="#555">LlmEvent::StartTool</text>
    <text x="290" y="136" font-size="10" font-family="monospace" fill="#888">──►</text>
    <text x="310" y="136" font-size="10" font-family="monospace" fill="#555">Message::Tool(AwaitingPermission)</text>
    <text x="540" y="136" font-size="10" font-family="monospace" fill="#888">──►</text>
    <text x="560" y="136" font-size="10" font-family="monospace" fill="#555">ModalRequest in ViewState</text>
    <text x="750" y="136" font-size="10" font-family="monospace" fill="#888">──►</text>
    <text x="770" y="136" font-size="10" font-family="monospace" fill="#555">User picks (modal → on_key_modal)</text>
    <text x="990" y="136" font-size="10" font-family="monospace" fill="#888">──►</text>
    <text x="1010" y="136" font-size="10" font-family="monospace" fill="#555">Command::Permission(choice)</text>
    <text x="120" y="154" font-size="10" font-family="monospace" fill="#888">──►</text>
    <text x="140" y="154" font-size="10" font-family="monospace" fill="#555">modal.resolve() → status → Done | Denied → ToolDone → new Assistant</text>
  </g>

  <!-- ================================================================ -->
  <!-- ROW 3: Backend orchestration — select! loop -->
  <!-- ================================================================ -->

  <g transform="translate(20, 720)">
    <rect x="0" y="0" width="1240" height="105" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="0" y="0" width="1240" height="28" rx="6" fill="#ffe0b2"/>
    <text x="620" y="19" font-size="13" font-weight="bold" text-anchor="middle" fill="#e65100">Backend::run() — tokio::select! event loop</text>

    <text x="30" y="52" font-size="11" font-family="monospace" fill="#c62828">① cmd_rx.recv()  ──►   Some(cmd)  ──►  backend.handle_command(cmd)</text>
    <text x="40" y="68" font-size="10" font-family="monospace" fill="#888">dispatch::run_action()  |  modal.resolve()  |  chat.push_system()</text>

    <text x="30" y="90" font-size="11" font-family="monospace" fill="#bf360c">② llm.rx.recv()   ──►   Some(ev)   ──►  backend.llm.handle_event(ev, &amp;mut chat, &amp;mut modal)</text>

    <text x="580" y="52" font-size="11" font-family="monospace" fill="#004d40">③ conn.ev_rx.recv() ──► Some(ev) ──► dispatch::apply_transport_event(&amp;mut backend, ev)</text>
    <text x="590" y="68" font-size="10" font-family="monospace" fill="#888">→ update ConnState → push_system (conn/disconn/error notices) → store latest_recv</text>

    <text x="580" y="94" font-size="11" font-family="monospace" fill="#1565c0">④ view_tx.send(backend.snapshot())  after EVERY event  (publish ViewState)</text>
  </g>

  <!-- ================================================================ -->
  <!-- ROW 4: Command parsing & completion data flow -->
  <!-- ================================================================ -->

  <g transform="translate(20, 840)">
    <rect x="0" y="0" width="1240" height="70" rx="6" fill="#fff" stroke="#888" stroke-width="1" filter="url(#sh)"/>
    <rect x="0" y="0" width="1240" height="26" rx="6" fill="#eee"/>
    <text x="620" y="18" font-size="12" font-weight="bold" text-anchor="middle" fill="#555">Command System (defined in commands.rs — read-only, used by frontend &amp; backend)</text>

    <text x="30" y="48" font-size="10" font-family="monospace" fill="#555">pub static COMMANDS: &amp;[CommandSpec]   ──   lookup / parse / complete via</text>
    <text x="575" y="48" font-size="10" font-family="monospace" fill="#555">parse_action(input) → Result&lt;Action, ParseError&gt; &nbsp;|&nbsp; completion_ctx(input) → CompletionCtx &nbsp;|&nbsp; matching_commands / matching_subs</text>
  </g>

  <!-- ================================================================ -->
  <!-- ARROWS connecting the pieces -->
  <!-- ================================================================ -->

  <!-- Channel 1 → Command box -->
  <line x1="100" y1="48" x2="100" y2="208" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#aCmd)"/>
  <line x1="760" y1="48" x2="560" y2="208" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#aCmd)"/>

  <!-- Channel 4 → LlmEvent box -->
  <line x1="530" y1="156" x2="1060" y2="208" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aLlm)"/>

</svg>

</body>
</html>
